<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Proximitty Trace Storybook Template</title>
  <style>
    body { margin: 0; font: 13px/1.4 system-ui, sans-serif; background: #101317; color: #eef2f7; }
    main { max-width: 1080px; margin: 0 auto; padding: 24px; display: grid; gap: 12px; }
    section { border: 1px solid #2d3540; border-radius: 8px; padding: 12px; background: #171c22; }
    code { color: #9bc8ff; }
  </style>
</head>
<body>
  <main>
    <h1>Proximitty Trace Storybook</h1>
    <section>Generated run storybooks are written to <code>.proofloop/runs/&lt;run-id&gt;/trace-storybook.html</code>.</section>
    <section>This template documents the compact proof atoms: user path, agent path, evidence cards, artifact changes, screenshots, verifier result, reward, cost, and repair notes.</section>
  </main>
</body>
</html>
